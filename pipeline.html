<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pipeline Simulator: Hazards & Stalls</title>
    <style>
        :root {
            --bg-color: #f4f4f9;
            --cell-bg: #ffffff;
            --border-color: #ddd;
            --primary: #3498db;
            --hazard: #e74c3c;
            --stall: #95a5a6;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text);
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        h1 { margin-bottom: 10px; }
        
        .controls {
            margin-bottom: 20px;
            display: flex;
            gap: 10px;
        }

        button {
            padding: 10px 20px;
            font-size: 16px;
            cursor: pointer;
            background-color: var(--primary);
            color: white;
            border: none;
            border-radius: 4px;
        }

        button:disabled { background-color: #ccc; cursor: not-allowed; }

        /* Pipeline Grid */
        .pipeline-container {
            display: grid;
            grid-template-columns: 60px repeat(15, 60px); /* Stage labels + 15 cycles */
            gap: 2px;
            background-color: #ccc;
            padding: 2px;
            border-radius: 4px;
            overflow-x: auto;
            max-width: 100%;
        }

        .stage-label {
            background-color: #333;
            color: white;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
            font-size: 12px;
        }

        .cycle-label {
            background-color: #eee;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 10px;
            color: #666;
        }

        .cell {
            background-color: var(--cell-bg);
            height: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 11px;
            font-weight: bold;
            position: relative;
        }

        /* Instruction Styles */
        .inst-0 { color: #2980b9; }
        .inst-1 { color: #27ae60; }
        .inst-2 { color: #8e44ad; }
        .inst-3 { color: #d35400; }

        /* Hazard & Stall Styles */
        .hazard {
            background-color: #fadbd8;
            border: 2px solid var(--hazard);
            color: var(--hazard);
        }
        
        .stall {
            background-color: #ecf0f1;
            color: var(--stall);
            font-style: italic;
        }

        /* Legend */
        .legend {
            margin-top: 20px;
            display: flex;
            gap: 20px;
            font-size: 14px;
        }
        .legend-item { display: flex; align-items: center; gap: 5px; }
        .box { width: 15px; height: 15px; border: 1px solid #333; }

        /* Log */
        #log {
            margin-top: 20px;
            width: 80%;
            max-width: 800px;
            height: 150px;
            overflow-y: auto;
            background: white;
            border: 1px solid #ccc;
            padding: 10px;
            font-family: monospace;
            font-size: 13px;
        }
        .log-entry { margin-bottom: 4px; border-bottom: 1px solid #eee; }
        .log-hazard { color: var(--hazard); font-weight: bold; }
        .log-stall { color: var(--stall); font-weight: bold; }

    </style>
</head>
<body>

    <h1>Pipeline Simulator</h1>
    
    <div class="controls">
        <button id="btn-step" onclick="step()">Step Forward</button>
        <button id="btn-auto" onclick="autoPlay()">Auto Play</button>
        <button onclick="reset()">Reset</button>
    </div>

    <div class="legend">
        <div class="legend-item"><div class="box" style="background:#2980b9"></div> I1 (ADD)</div>
        <div class="legend-item"><div class="box" style="background:#27ae60"></div> I2 (SUB)</div>
        <div class="legend-item"><div class="box" style="background:#8e44ad"></div> I3 (AND)</div>
        <div class="legend-item"><div class="box" style="background:#fadbd8; border-color:#e74c3c"></div> Hazard</div>
        <div class="legend-item"><div class="box" style="background:#ecf0f1"></div> Stall (Bubble)</div>
    </div>

    <div class="pipeline-container" id="grid">
        <!-- Grid generated by JS -->
    </div>

    <div id="log"></div>

  <script>
  // --- Configuration ---
  const STAGES = ["IF", "ID", "EX", "MEM", "WB"];
  const MAX_CYCLES = 15;

  // --- Instructions Data ---
  // Format: { id, op, dest, src1, src2 }
  const instructions = [
    { id: 0, op: "ADD", dest: "R1", src1: "R2", src2: "R3" },
    { id: 1, op: "SUB", dest: "R4", src1: "R1", src2: "R5" }, // depends on R1
    { id: 2, op: "AND", dest: "R6", src1: "R1", src2: "R7" }, // depends on R1
  ];

  // --- State ---
  let currentCycle = 0;
  let isRunning = false;
  let autoPlayInterval = null;

  // timeline[stageIndex][cycle] = instructionId | "NOP" | null
  let timeline = Array(STAGES.length)
    .fill(null)
    .map(() => Array(MAX_CYCLES).fill(null));

  // Current pipeline register contents (what's in each stage RIGHT NOW)
  // stageState[s] = instructionId | null
  let stageState = Array(STAGES.length).fill(null);

  // Next instruction to fetch
  let pc = 0;

  // --- UI Grid ---
  function initGrid() {
    const grid = document.getElementById("grid");
    grid.innerHTML = "";

    const corner = document.createElement("div");
    corner.className = "stage-label";
    corner.innerText = "Stage";
    grid.appendChild(corner);

    for (let c = 0; c < MAX_CYCLES; c++) {
      const label = document.createElement("div");
      label.className = "cycle-label";
      label.innerText = c + 1;
      grid.appendChild(label);
    }

    STAGES.forEach((stage, rowIndex) => {
      const sLabel = document.createElement("div");
      sLabel.className = "stage-label";
      sLabel.innerText = stage;
      grid.appendChild(sLabel);

      for (let c = 0; c < MAX_CYCLES; c++) {
        const cell = document.createElement("div");
        cell.className = "cell";
        cell.id = `cell-${rowIndex}-${c}`;
        grid.appendChild(cell);
      }
    });
  }

  // --- Log ---
  function log(msg, type = "normal") {
    const logDiv = document.getElementById("log");
    const entry = document.createElement("div");
    entry.className = "log-entry";
    if (type === "hazard") entry.classList.add("log-hazard");
    if (type === "stall") entry.classList.add("log-stall");
    entry.innerText = `Cycle ${currentCycle + 1}: ${msg}`;
    logDiv.prepend(entry);
  }

  // --- Hazard Detection (RAW, no forwarding) ---
  // Hazard when ID reads a register that will be written by an older instruction
  // still in EX/MEM/WB.
  function hasRAW_Hazard(idInstId) {
    if (idInstId === null) return false;

    const idInst = instructions[idInstId];
    const readRegs = [idInst.src1, idInst.src2].filter(Boolean);

    // Older instructions that haven't written back yet are in EX/MEM/WB
    const producers = [stageState[2], stageState[3], stageState[4]].filter(
      (x) => x !== null
    );

    for (const prodId of producers) {
      const prod = instructions[prodId];
      if (!prod.dest) continue;
      if (readRegs.includes(prod.dest)) return true;
    }
    return false;
  }

  // --- One cycle step ---
  function step() {
    if (currentCycle >= MAX_CYCLES) {
      stopAuto();
      return;
    }

    // 1) Record current stageState into timeline for this cycle
    for (let s = 0; s < STAGES.length; s++) {
      timeline[s][currentCycle] = stageState[s];
    }

    // 2) Decide if we must stall (hazard checked in ID stage)
    const idInstId = stageState[1];
    const stall = hasRAW_Hazard(idInstId);

    // 3) Compute next stageState
    const next = Array(STAGES.length).fill(null);

    // WB gets whatever was in MEM
    next[4] = stageState[3];

    // MEM gets whatever was in EX
    next[3] = stageState[2];

    if (stall) {
      // Insert bubble into EX; keep ID same; keep IF same; don't advance PC
      next[2] = null; // bubble
      next[1] = stageState[1]; // freeze ID
      next[0] = stageState[0]; // freeze IF
      log("RAW hazard in ID → Stall: freeze IF/ID, insert bubble in EX", "stall");
    } else {
      // Normal advance
      next[2] = stageState[1]; // ID -> EX
      next[1] = stageState[0]; // IF -> ID

      // Fetch new instruction into IF
      if (pc < instructions.length) {
        next[0] = pc;
        pc++;
      } else {
        next[0] = null;
      }
    }

    // 4) Commit next state
    stageState = next;

    // 5) Render timeline so far
    render();

    // 6) Advance cycle
    currentCycle++;

    // Auto-stop if pipeline is empty and no more instructions
    const pipelineEmpty = stageState.every((x) => x === null);
    if (pipelineEmpty && pc >= instructions.length) stopAuto();
  }

  // --- Render the full timeline grid ---
  function render() {
    // Clear grid
    document.querySelectorAll(".cell").forEach((c) => {
      c.className = "cell";
      c.innerText = "";
    });

    for (let s = 0; s < STAGES.length; s++) {
      for (let c = 0; c < MAX_CYCLES; c++) {
        const cell = document.getElementById(`cell-${s}-${c}`);
        const val = timeline[s][c];

        if (val === null) continue;

        // Bubble display:
        // We show NOP when EX stage is intentionally bubbled due to stall.
        // How detect? If stage is EX and val is null we can't store it.
        // So instead: if cell empty but we stalled that cycle, we mark EX as NOP in timeline.
        // We'll handle it by marking NOP at record-time: easiest fix below.
        // (But we can also infer from logs; better to explicitly store it.)

        // Instruction display
        const inst = instructions[val];
        cell.innerText = `${inst.op} ${inst.dest}`;
        cell.classList.add(`inst-${inst.id}`);

        // Hazard highlight (ID stage only)
        if (s === 1) {
          // recreate hazard check based on what older stages were in SAME cycle snapshot
          const idInst = inst;
          const readRegs = [idInst.src1, idInst.src2].filter(Boolean);

          const exId = timeline[2][c];
          const memId = timeline[3][c];
          const wbId = timeline[4][c];

          const older = [exId, memId, wbId].filter((x) => x !== null);
          let hazard = false;
          for (const oid of older) {
            const prod = instructions[oid];
            if (prod.dest && readRegs.includes(prod.dest)) hazard = true;
          }
          if (hazard) cell.classList.add("hazard");
        }
      }
    }

    // Add explicit NOP bubbles (visual only):
    // If ID had hazard in a cycle, EX for that cycle+1 is a bubble.
    // We stored bubbles as null, so we overlay NOP where appropriate.
    // We can recompute from timeline: if at cycle c, ID depends on EX/MEM/WB,
    // then at cycle c+1 EX is bubble.
    for (let c = 0; c < MAX_CYCLES - 1; c++) {
      const idVal = timeline[1][c];
      if (idVal === null) continue;

      const idInst = instructions[idVal];
      const readRegs = [idInst.src1, idInst.src2].filter(Boolean);

      const older = [timeline[2][c], timeline[3][c], timeline[4][c]].filter(
        (x) => x !== null
      );

      let hazard = false;
      for (const oid of older) {
        const prod = instructions[oid];
        if (prod.dest && readRegs.includes(prod.dest)) hazard = true;
      }

      if (hazard) {
        const exCell = document.getElementById(`cell-2-${c + 1}`);
        // only paint if nothing is there already
        if (exCell && exCell.innerText === "") {
          exCell.classList.add("stall");
          exCell.innerText = "NOP";
        }
      }
    }
  }

  // --- Controls ---
  function autoPlay() {
    if (isRunning) {
      stopAuto();
      return;
    }
    isRunning = true;
    document.getElementById("btn-auto").innerText = "Pause";
    autoPlayInterval = setInterval(step, 700);
  }

  function stopAuto() {
    isRunning = false;
    clearInterval(autoPlayInterval);
    document.getElementById("btn-auto").innerText = "Auto Play";
  }

  function reset() {
    stopAuto();
    currentCycle = 0;
    pc = 0;
    stageState = Array(STAGES.length).fill(null);
    timeline = Array(STAGES.length)
      .fill(null)
      .map(() => Array(MAX_CYCLES).fill(null));
    document.getElementById("log").innerHTML = "";
    render();
  }

  // --- Start ---
  initGrid();
  render();
</script>
</body>
</html>
